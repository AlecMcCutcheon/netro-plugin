# When you push a version tag (v1.0.0, v1.0.1, etc.), build and publish a GitHub Release
# with the JAR attached.
# Release checklist: set same version in plugin.yml, RELEASE_INFO.md, and pom.xml; then:
#   git add -A && git commit -m "Release X.Y.Z: ..." && git push origin main
#   git tag -a vX.Y.Z -m "Release X.Y.Z" && git push origin vX.Y.Z
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Get JAR name
        id: jar
        run: |
          JAR=$(ls target/netro-*.jar | head -1)
          echo "path=$JAR" >> $GITHUB_OUTPUT
          echo "name=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.path }}
          body_path: RELEASE_INFO.md
          replace_existing: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
